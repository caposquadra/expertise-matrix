name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql+asyncpg://app:app_secret@localhost:5432/expertise_matrix_test
  SECRET_KEY: ci-secret-key
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend/app/
      - run: ruff format --check backend/app/

  typecheck-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install mypy
      - run: mypy backend/app/ --ignore-missing-imports

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  typecheck-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit

  test-backend:
    needs: [lint-backend, typecheck-backend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: expertise_matrix_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d expertise_matrix_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pip install -r backend/requirements.txt pytest-cov
      - name: Run backend tests
        run: pytest tests/ -v --ignore=tests/unit/test_contract.py --tb=short
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://app:app_secret@localhost:5432/expertise_matrix_test
          SECRET_KEY: ${{ env.SECRET_KEY }}
          PYTHONPATH: .

  test-frontend:
    needs: [lint-frontend, typecheck-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm ci
      - run: cd frontend && npm test -- --coverage
      - uses: codecov/codecov-action@v5
        with:
          file: ./frontend/coverage/coverage-final.json
          fail_ci_if_error: false

  test-e2e:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: expertise_matrix_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d expertise_matrix_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pip install -r backend/requirements.txt
      - name: Run migrations
        run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://app:app_secret@localhost:5432/expertise_matrix_test
          SECRET_KEY: ${{ env.SECRET_KEY }}
      - name: Seed database
        run: python -m scripts.seed
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://app:app_secret@localhost:5432/expertise_matrix_test
          SECRET_KEY: ${{ env.SECRET_KEY }}
      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://app:app_secret@localhost:5432/expertise_matrix_test
          SECRET_KEY: ${{ env.SECRET_KEY }}
      - run: cd frontend && npm ci
      - name: Start frontend dev server
        run: |
          cd frontend && VITE_PROXY_TARGET=http://localhost:8000 npx vite --port 3000 &
          sleep 3
      - run: cd frontend && npx playwright install chromium
      - run: cd frontend && npx playwright test
        env:
          CI: "true"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  build:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker/docker-compose.yml build
