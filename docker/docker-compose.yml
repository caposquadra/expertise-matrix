services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: expertise_matrix
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_secret
    # ports:  # не экспортируем — только внутренняя сеть Docker
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d expertise_matrix"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app_secret@postgres:5432/expertise_matrix
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      RATE_LIMIT_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  frontend-ci:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app

volumes:
  pgdata:
